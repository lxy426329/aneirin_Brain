# ============================================================
# Ombre Brain Configuration / 配置文件
# Copy this file to config.yaml and modify as needed
# 复制此文件为 config.yaml 后按需修改
# ============================================================

# --- Transport / 传输方式 ---
# stdio: local use (Claude Desktop, direct pipe)
# sse: remote use with SSE (recommended for Render / Cloudflare Tunnel)
# streamable-http: remote use, Streamable HTTP (alternative)
# stdio: 本地使用（Claude Desktop，直接管道通信）
# sse: 远程使用，SSE 模式（推荐用于 Render / Cloudflare Tunnel）
# streamable-http: 远程使用，Streamable HTTP 模式（备选）
transport: stdio"

# --- Log level / 日志级别 ---
log_level: "INFO"

# --- Bucket storage path / 记忆桶存储路径 ---
# Point this to your Obsidian vault subdirectory, or any local folder
# 指向你的 Obsidian 仓库子目录，或任意本地文件夹
# Leave as-is to use the built-in ./buckets/ directory
# 保持默认则使用内置的 ./buckets/ 目录
# buckets_dir: "/path/to/your/Obsidian Vault/Ombre Brain"

# --- Merge threshold / 桶合并阈值 ---
# When storing a new memory, if similarity with an existing bucket exceeds
# this value (0-100), merge instead of creating a new one
# 存新记忆时，如果与已有桶的相似度超过此值（0-100），则合并而非新建
merge_threshold: 75

# --- Dehydration API / 脱水压缩 API 配置 ---
# Uses a cheap LLM for intelligent compression. API is required; if the
# configured key/endpoint is unavailable, hold/grow will raise an explicit
# error instead of silently degrading (see BEHAVIOR_SPEC.md 三、降级行为表).
# 用廉价 LLM 做智能压缩。API 为必需；如 key/endpoint 不可用，
# hold/grow 会直接报错而非静默降级（详见 BEHAVIOR_SPEC.md 三、降级行为表）。
dehydration:
  # Supports any OpenAI-compatible API: DeepSeek / Ollama / LM Studio / vLLM / Gemini etc.
  # 支持所有 OpenAI 兼容 API：DeepSeek / Ollama / LM Studio / vLLM / Gemini 等
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  # Common base_url examples / 常见 base_url 示例：
  #   DeepSeek:    https://api.deepseek.com/v1
  #   SiliconFlow: https://api.siliconflow.cn/v1
  #   Ollama:      http://localhost:11434/v1
  #   LM Studio:   http://localhost:1234/v1
  #   vLLM:        http://localhost:8000/v1
  #   Gemini:      https://generativelanguage.googleapis.com/v1beta/openai
  # api_key: ""    # ⚠️ Use env var OMBRE_API_KEY instead / 请使用环境变量 OMBRE_API_KEY
  max_tokens: 1024
  temperature: 0.1

# --- Decay parameters / 记忆衰减参数 ---
# Simulates Ebbinghaus forgetting curve, auto-archives inactive memories
# 模拟艾宾浩斯遗忘曲线，自动归档不活跃的记忆
decay:
  lambda: 0.05                    # Decay rate / 衰减速率（越大遗忘越快）
  threshold: 0.3                  # Archive threshold / 归档阈值
  check_interval_hours: 24        # Check interval (hours) / 衰减检查间隔（小时）
  emotion_weights:
    base: 1.0                     # Base weight / 基础权重
    arousal_boost: 0.8            # Arousal boost coefficient / 唤醒度加成系数

# --- Embedding / 向量化配置 ---
# Uses embedding API for semantic similarity search
# 通过 embedding API 实现语义相似度搜索
# You can configure embedding independently from dehydration.
# If api_key is omitted, reuses the same API key (OMBRE_API_KEY) and base_url from dehydration config
# 你可以把 embedding 独立配置；若 api_key 留空，复用脱水配置的 API key 和 base_url
embedding:
  enabled: true                   # Enable embedding / 启用向量化
  model: "gemini-embedding-001"   # Embedding model / 向量化模型
  base_url: ""                    # API base URL (leave empty to reuse dehydration.base_url)
                                  # 留空复用 dehydration.base_url
  # api_key: ""                  # Leave empty to reuse dehydration api_key
                                  # 留空复用 dehydration 的 api_key

# --- Scoring weights / 检索权重参数 ---
# total = topic(×4) + emotion(×2) + time(×1.5) + importance(×1)
scoring_weights:
  topic_relevance: 4.0
  emotion_resonance: 2.0
  time_proximity: 1.5
  importance: 1.0

# --- Hybrid Search / 混合检索配置 ---
# BM25 + Vector + Rerank 混合检索模式
# - BM25: 关键词精确匹配（锁死实体词：特定外号、地点、设备名）
# - Vector: 语义向量匹配（情绪、意图、抽象概念）
# - Rerank: 重排序模型过滤（只截取 Top 3~5 条）
hybrid_search:
  enabled: true                    # Enable hybrid search / 启用混合检索
  exact_query_keywords:            # Keywords that trigger exact matching
    - 烛台
    - 名册
    - 年轮
    - 锚点
    - 时间链
    - 模式
    - 经验
    - 感受
    - 记忆
    - 事件
  exact_threshold: 0.2            # Minimum score threshold for exact matches (0-1)
  semantic_threshold: 0.1         # Minimum score threshold for semantic matches (0-1)
  vector_weight_scale: 0.2        # Vector weight scale in exact mode (0-1)
  keyword_weight_scale: 2.0       # Keyword weight scale in exact mode
  rerank_top_k: 5                 # Number of results after reranking / Rerank后保留条数
  rerank_model: "BAAI/bge-reranker-base"  # Rerank model name / 重排序模型

# --- Fuzzy matching / 模糊匹配参数 ---
matching:
  fuzzy_threshold: 50             # Minimum match score (0-100) / 最低匹配分数
  max_results: 5                  # Max results per search / 单次搜索最多返回条数

# --- Obsidian wikilinks / Obsidian 双链自动注入 ---
wikilink:
  enabled: true
  use_tags: false
  use_domain: true
  use_auto_keywords: true
  auto_top_k: 4
  min_keyword_len: 3
  exclude_keywords: []

# --- Emotion configuration / 情绪配置 ---
# Base emotion list for synonym merging
# 基础情绪词表，用于同义词归并
emotions:
  base_list:
    - 开心
    - 难过
    - 愤怒
    - 焦虑
    - 平静
    - 兴奋
    - 委屈
    - 感动
    - 失落
    - 期待
    - 恐惧
    - 惊喜
    - 愧疚
    - 骄傲
    - 嫉妒
    - 羡慕
    - 悲伤
    - 快乐
    - 抑郁
    - 孤独

# --- Dashboard / 仪表板配置 ---
dashboard:
  # Password for accessing the web dashboard
  # 仪表板访问密码
  # Leave empty to use OMBRE_DASHBOARD_PASSWORD env var
  # 留空则使用 OMBRE_DASHBOARD_PASSWORD 环境变量
  password: ""

# --- Echo Chamber / 回音壁配置 ---
echo_chamber:
  enabled: true                    # Enable echo chamber / 启用回音壁
  storage_path: ""                 # Custom storage path (default: ./echo_chamber/)
  auto_cleanup_days: 30            # Auto-cleanup actions older than N days / 自动清理超过N天的提案
  max_pending_actions: 100         # Max pending actions before warning / 最大待审批提案数

# --- Housekeeper / 管家任务配置 ---
housekeeper:
  enabled: true                    # Enable housekeeper auto-scheduling / 启用管家自动调度
  daily_run_time: "02:00"          # Daily digest run time (UTC) / 每日摘要执行时间（UTC）
  weekly_run_time: "03:00"         # Weekly digest run time (UTC) / 每周摘要执行时间（UTC）
  weekly_run_day: 0                # Day of week for weekly digest (0=Sunday) / 每周摘要执行日（0=周日）
  check_interval_minutes: 60       # How often to check if it's time to run / 检查是否需要运行的间隔（分钟）
  conflict_detection: true         # Enable memory conflict detection / 启用记忆冲突检测
  emotion_tracking: true           # Enable daily emotion baseline tracking / 启用日常情绪基线追踪
