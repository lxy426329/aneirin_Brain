<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ombre Brain - 回音壁</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDFCF0;
    --bg-gradient: radial-gradient(ellipse at 30% 20%, #FDFCF0 0%, #EDE4D3 60%, #E2D1B3 100%);
    --surface: rgba(255, 255, 255, 0.45);
    --surface-solid: #F7F2E8;
    --border: rgba(180, 165, 140, 0.3);
    --border-strong: rgba(160, 140, 110, 0.5);
    --text: #3A3530;
    --text-dim: #8A8070;
    --text-light: #B0A590;
    --accent: #2F4F4F;
    --accent-light: #3D6363;
    --accent-hover: #254040;
    --accent-glow: rgba(47, 79, 79, 0.12);
    --positive: #4A7C59;
    --negative: #8B4A4A;
    --warning: #9A7B4F;
    --shadow-light: rgba(255, 252, 240, 0.7);
    --shadow-dark: rgba(163, 148, 120, 0.4);
    --shadow-dark-subtle: rgba(163, 148, 120, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 400;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(12px);
    background: rgba(253, 252, 240, 0.7);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }

  .btn-primary {
    padding: 10px 22px;
    background: linear-gradient(145deg, var(--accent-light), var(--accent));
    color: #F0EDE4;
    border: none;
    border-radius: 24px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 6px 6px 12px rgba(40, 65, 65, 0.25), -4px -4px 10px var(--shadow-light), inset 0 1px 0 rgba(255,255,255,0.1);
    letter-spacing: 0.4px;
  }

  .btn-primary:hover {
    box-shadow: 8px 8px 16px rgba(40, 65, 65, 0.3), -5px -5px 12px var(--shadow-light);
    transform: translateY(-2px);
  }

  .btn-secondary {
    padding: 10px 22px;
    background: linear-gradient(145deg, #FAF6ED, #EDE4D3);
    color: var(--accent);
    border: none;
    border-radius: 24px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 5px 5px 10px var(--shadow-dark-subtle), -5px -5px 10px var(--shadow-light);
  }

  .btn-secondary:hover {
    box-shadow: 7px 7px 14px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
    transform: translateY(-2px);
  }

  .content { padding: 32px 40px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 4px 4px 10px var(--shadow-dark-subtle), -4px -4px 10px var(--shadow-light);
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
  }

  .stat-card .icon {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .filter-tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 400;
    border: none;
    border-radius: 24px;
    background: linear-gradient(145deg, #FAF6ED, #EDE4D3);
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 4px 4px 8px var(--shadow-dark-subtle), -4px -4px 8px var(--shadow-light);
  }

  .filter-tab:hover {
    color: var(--text);
    box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    transform: translateY(-1px);
  }

  .filter-tab.active {
    color: #F0EDE4;
    background: linear-gradient(145deg, var(--accent-light), var(--accent));
    box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2), inset -2px -2px 4px rgba(255,255,255,0.05);
  }

  .digest-list, .action-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .digest-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: 4px 4px 10px var(--shadow-dark-subtle), -4px -4px 10px var(--shadow-light);
    transition: all 0.25s ease;
  }

  .digest-card:hover {
    border-color: var(--accent);
    box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    transform: translateY(-2px);
  }

  .digest-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .digest-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .digest-id {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .digest-type {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: #E8F4F4;
    color: #2F4F4F;
  }

  .digest-type.weekly {
    background: #F4F0E8;
    color: #9A7B4F;
  }

  .digest-meta {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .mood-indicator {
    padding: 8px 14px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .mood-indicator.low { background: #FFE4E4; color: #8B4A4A; }
  .mood-indicator.slightly_low { background: #FFF0D4; color: #9A7B4F; }
  .mood-indicator.high { background: #E4FFE4; color: #4A7C59; }
  .mood-indicator.slightly_high { background: #E4FFE4; color: #4A7C59; }
  .mood-indicator.neutral { background: #F5F3E8; color: #8A8070; }

  .mood-tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    background: white;
    color: inherit;
  }

  .digest-content {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .action-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: 4px 4px 10px var(--shadow-dark-subtle), -4px -4px 10px var(--shadow-light);
    transition: all 0.25s ease;
  }

  .action-card:hover {
    box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    transform: translateY(-2px);
  }

  .action-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .action-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .action-id {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }

  .action-type {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
  }

  .action-type.conflict { background: #FFE4E4; color: #8B4A4A; }
  .action-type.cleanup { background: #FFF0D4; color: #9A7B4F; }
  .action-type.merge { background: #E4FFE4; color: #4A7C59; }
  .action-type.chain_update { background: #E8F4F4; color: #2F4F4F; }

  .action-status {
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 500;
  }

  .action-status.pending { background: #FFF0D4; color: #9A7B4F; }
  .action-status.approved { background: #E4FFE4; color: #4A7C59; }
  .action-status.rejected { background: #FFE4E4; color: #8B4A4A; }

  .conflict-details {
    background: #FFF5F5;
    border: 1px solid #FFE4E4;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .conflict-reason {
    font-size: 13px;
    color: #8B4A4A;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .conflict-record {
    font-size: 12px;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .conflict-record.old { color: var(--text-dim); }
  .conflict-record.new { color: var(--text); font-weight: 500; }

  .cleanup-details {
    background: #FFF8F0;
    border: 1px solid #FFF0D4;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .cleanup-reason {
    font-size: 13px;
    color: #9A7B4F;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .action-actions {
    display: flex;
    gap: 12px;
  }

  .btn-approve {
    padding: 8px 20px;
    border-radius: 12px;
    border: none;
    background: var(--positive);
    color: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-approve:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(74, 124, 89, 0.3);
  }

  .btn-reject {
    padding: 8px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reject:hover {
    border-color: var(--negative);
    color: var(--negative);
    transform: translateY(-1px);
  }

  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 60px;
    font-size: 14px;
    font-weight: 300;
  }

  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.2s;
  }

  .back-link:hover {
    color: var(--accent);
  }

  @media (max-width: 768px) {
    .header { padding: 20px; flex-wrap: wrap; }
    .header h1 { font-size: 22px; }
    .header-actions { margin-left: 0; width: 100%; margin-top: 12px; }
    .content { padding: 20px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .filter-tabs { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <a href="/dashboard" class="back-link">← 返回主控台</a>
  <h1>◐ 回音壁</h1>
  <span class="subtitle">AI管家的工作总结与提案中心</span>
  <div class="header-actions">
    <button class="btn-secondary" onclick="runDailyHousekeeper()">运行每日管家</button>
    <button class="btn-primary" onclick="refreshEchoChamber()">刷新数据</button>
  </div>
</div>

<div class="content">
  <div class="stats-row">
    <div class="stat-card">
      <div class="icon">📅</div>
      <div class="label">每日摘要</div>
      <div class="value" id="stat-daily">0</div>
    </div>
    <div class="stat-card">
      <div class="icon">📆</div>
      <div class="label">每周摘要</div>
      <div class="value" id="stat-weekly">0</div>
    </div>
    <div class="stat-card">
      <div class="icon">📋</div>
      <div class="label">待审批提案</div>
      <div class="value" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <div class="icon">⚠️</div>
      <div class="label">冲突检测</div>
      <div class="value" id="stat-conflicts">0</div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterEcho('daily')">每日摘要</button>
    <button class="filter-tab" onclick="filterEcho('weekly')">每周摘要</button>
    <button class="filter-tab" onclick="filterEcho('pending')">待审批提案</button>
    <button class="filter-tab" onclick="filterEcho('all')">全部</button>
  </div>

  <div id="digest-section" style="display:block;">
    <h3 style="margin:0 0 16px 0;font-size:15px;color:var(--text);font-weight:600;">📝 摘要列表</h3>
    <div id="digest-list">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <div id="action-section" style="display:none;">
    <h3 style="margin:0 0 16px 0;font-size:15px;color:var(--text);font-weight:600;">📋 待审批提案</h3>
    <div id="action-list">
      <div class="loading">加载中…</div>
    </div>
  </div>
</div>

<script>
var echoData = null;
var echoFilter = 'daily';

async function refreshEchoChamber() {
  try {
    const resp = await fetch('/api/echo-chamber', { credentials: 'include' });
    if (!resp.ok) {
      throw new Error('请求失败');
    }
    echoData = await resp.json();
    renderEchoChamber();
  } catch(e) {
    console.error('Failed to load echo chamber:', e);
    document.getElementById('digest-list').innerHTML = '<div class="loading">加载失败</div>';
    document.getElementById('action-list').innerHTML = '<div class="loading">加载失败</div>';
  }
}

function filterEcho(type) {
  echoFilter = type;
  document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  
  const digestSection = document.getElementById('digest-section');
  const actionSection = document.getElementById('action-section');
  
  if (type === 'daily' || type === 'weekly' || type === 'all') {
    digestSection.style.display = 'block';
  } else {
    digestSection.style.display = 'none';
  }
  
  if (type === 'pending' || type === 'all') {
    actionSection.style.display = 'block';
  } else {
    actionSection.style.display = 'none';
  }
  
  renderEchoChamber();
}

function renderEchoChamber() {
  if (!echoData) return;
  
  document.getElementById('stat-daily').textContent = echoData.digests?.filter(d => d.digest_type === 'daily').length || 0;
  document.getElementById('stat-weekly').textContent = echoData.digests?.filter(d => d.digest_type === 'weekly').length || 0;
  document.getElementById('stat-pending').textContent = echoData.pending_actions || 0;
  document.getElementById('stat-conflicts').textContent = echoData.actions?.filter(a => a.action_type === 'conflict').length || 0;
  
  const digestList = document.getElementById('digest-list');
  const actionList = document.getElementById('action-list');
  
  const digestSection = document.getElementById('digest-section');
  const actionSection = document.getElementById('action-section');
  
  if (digestSection.style.display === 'block') {
    const filteredDigests = echoData.digests?.filter(d => {
      if (echoFilter === 'all') return true;
      return d.digest_type === echoFilter;
    }) || [];
    
    if (filteredDigests.length === 0) {
      digestList.innerHTML = '<div class="loading">暂无摘要数据</div>';
    } else {
      digestList.innerHTML = filteredDigests.map(digest => {
        const metadata = digest.metadata || {};
        const moodTags = metadata.mood_tags || [];
        const moodLevel = metadata.mood_level || '';
        const bucketCount = metadata.bucket_count || 0;
        
        const moodLabels = {
          low: '情绪低落',
          slightly_low: '情绪偏低',
          high: '情绪高涨',
          slightly_high: '情绪较好',
          neutral: '情绪平稳'
        };
        
        let moodHtml = '';
        if (moodTags.length > 0 || moodLevel !== 'neutral') {
          moodHtml = `
            <div class="mood-indicator ${moodLevel}">
              <span style="font-weight:500;">${moodLabels[moodLevel]}</span>
              ${moodTags.map(tag => `<span class="mood-tag">${tag}</span>`).join('')}
            </div>
          `;
        }
        
        return `
          <div class="digest-card">
            <div class="digest-header">
              <div>
                <div class="digest-title">
                  <span class="digest-id">${digest.digest_id}</span>
                  <span class="digest-type ${digest.digest_type === 'daily' ? '' : 'weekly'}">
                    ${digest.digest_type === 'daily' ? '每日' : '每周'}
                  </span>
                </div>
                <div class="digest-meta">${digest.created || ''} | 已审阅: ${digest.reviewed ? '是' : '否'}</div>
              </div>
            </div>
            ${bucketCount > 0 ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">处理了 ${bucketCount} 条记忆</div>` : ''}
            ${moodHtml}
            <div class="digest-content">${digest.content}</div>
          </div>
        `;
      }).join('');
    }
  }
  
  if (actionSection.style.display === 'block') {
    const actions = echoData.actions || [];
    
    if (actions.length === 0) {
      actionList.innerHTML = '<div class="loading">暂无待审批提案</div>';
    } else {
      actionList.innerHTML = actions.map(action => {
        const data = action.data || {};
        const actionTypeLabels = {
          conflict: '记忆冲突',
          cleanup: '清理提案',
          merge: '合并提案',
          chain_update: '链更新'
        };
        
        let contentHtml = '';
        
        if (action.action_type === 'conflict') {
          contentHtml = `
            <div class="conflict-details">
              <div class="conflict-reason">${data.conflict_reason}</div>
              <div class="conflict-record old">旧记录: ${data.old_metadata?.created?.slice(0,10) || ''} - ${data.old_content || ''}</div>
              <div class="conflict-record new">新记录: ${data.new_metadata?.created?.slice(0,10) || ''} - ${data.new_content || ''}</div>
            </div>
          `;
        } else if (action.action_type === 'cleanup') {
          contentHtml = `
            <div class="cleanup-details">
              <div class="cleanup-reason">${data.reason || '清理原因'}</div>
              <div style="font-size:12px;color:var(--text-dim);">Bucket: ${data.bucket_id || ''}</div>
            </div>
          `;
        }
        
        return `
          <div class="action-card">
            <div class="action-header">
              <div>
                <div class="action-title">
                  <span class="action-id">${action.action_id}</span>
                  <span class="action-type ${action.action_type}">${actionTypeLabels[action.action_type] || action.action_type}</span>
                </div>
                <div class="digest-meta">${action.created || ''}</div>
              </div>
              <span class="action-status ${action.status}">${action.status === 'pending' ? '待审批' : action.status === 'approved' ? '已批准' : '已驳回'}</span>
            </div>
            ${contentHtml}
            ${action.status === 'pending' ? `
              <div class="action-actions">
                <button class="btn-approve" onclick="approveEchoAction('${action.action_id}')">批准</button>
                <button class="btn-reject" onclick="rejectEchoAction('${action.action_id}')">驳回</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
  }
}

async function runDailyHousekeeper() {
  try {
    const resp = await fetch('/api/run-housekeeper', { 
      method: 'POST', 
      credentials: 'include' 
    });
    if (!resp.ok) {
      throw new Error('请求失败');
    }
    const data = await resp.json();
    alert('管家执行完成:\n\n' + data);
    refreshEchoChamber();
  } catch(e) {
    alert('管家执行失败: ' + e.message);
  }
}

async function approveEchoAction(actionId) {
  try {
    const resp = await fetch('/api/echo-chamber/approve', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action_id: actionId}),
      credentials: 'include'
    });
    if (!resp.ok) {
      throw new Error('请求失败');
    }
    refreshEchoChamber();
  } catch(e) {
    alert('操作失败: ' + e.message);
  }
}

async function rejectEchoAction(actionId) {
  try {
    const resp = await fetch('/api/echo-chamber/reject', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action_id: actionId}),
      credentials: 'include'
    });
    if (!resp.ok) {
      throw new Error('请求失败');
    }
    refreshEchoChamber();
  } catch(e) {
    alert('操作失败: ' + e.message);
  }
}

document.addEventListener('DOMContentLoaded', refreshEchoChamber);
</script>

</body>
</html>
