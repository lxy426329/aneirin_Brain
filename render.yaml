services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: sse
      - key: deepseek_api_key
        sync: false          # Set in Render dashboard > Environment (DeepSeek API key)
      - key: OMBRE_BASE_URL
        sync: false          # e.g. https://api.deepseek.com/v1 or https://api.siliconflow.cn/v1
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 1
